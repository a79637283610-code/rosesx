<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор оплаты - ShinyRoses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4CAF50;
            --error: #ff4444;
        }

        body {
            font-family: 'Georgia', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .simulator-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: var(--bg-secondary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 200px;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }

        .btn-failure {
            background: var(--error);
            color: white;
        }

        .btn-failure:hover {
            background: #e53935;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .simulator-container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .message {
                font-size: 1rem;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="simulator-container">
        <h1>Симулятор оплаты</h1>
        <p class="message">
            Выберите результат оплаты для тестирования
        </p>
        <div class="buttons">
            <button class="btn btn-success" onclick="paymentSuccess()">Оплата прошла</button>
            <button class="btn btn-failure" onclick="paymentFailure()">Оплата не прошла</button>
        </div>
    </div>

    <script>
        function paymentSuccess() {
            window.location.href = 'payment-success.html';
        }

        function paymentFailure() {
            window.location.href = 'payment-failure.html';
        }
    </script>
</body>
</html>
