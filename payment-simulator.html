<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата - ShinyRoses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            font-family: 'Georgia', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: var(--bg-secondary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 40px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 200px;
            background: var(--gold);
            color: var(--bg-primary);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 768px) {
            .payment-container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .message {
                font-size: 1rem;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <h1>Оплата заказа</h1>
        <p class="message" id="orderInfo">Загрузка информации о заказе...</p>
        <button class="btn" onclick="initiatePayment()">Оплатить</button>
    </div>

    <script>
        // Получаем данные заказа из localStorage
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const lastOrder = orders[orders.length - 1];

        if (lastOrder) {
            document.getElementById('orderInfo').innerHTML = `
                Товар: ${lastOrder.productName}<br>
                Сумма: ${lastOrder.totalAmount}<br>
                Количество: ${lastOrder.quantity}
            `;
        }

        function initiatePayment() {
            if (!lastOrder) {
                alert('Ошибка: данные заказа не найдены');
                window.location.href = 'index.html';
                return;
            }

            const amount = parseInt(lastOrder.totalAmount);
            const orderId = 'order-' + Date.now();

            var widget = new cp.CloudPayments();
            widget.pay('auth', {
                publicId: 'pk_83ce8c1e6b85ef9e73ed3afdb7c64',
                description: 'Оплата букета роз',
                amount: amount,
                currency: 'RUB',
                invoiceId: orderId,
                skin: "mini"
            }, {
                onSuccess: function(options) {
                    // Перенаправляем на страницу успешной оплаты
                    window.location.href = 'payment-success.html';
                },
                onFail: function(reason, options) {
                    alert('Ошибка оплаты: ' + reason);
                    window.location.href = 'index.html';
                }
            });
        }
    </script>
</body>
</html>
