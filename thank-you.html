<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заказ - ShinyRoses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: #111111;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .success-icon {
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            color: #c0b7a8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .order-info {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .order-info p {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .order-info strong {
            color: #d4af37;
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #b8860b, #d4af37, #f0d78c);
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .success-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Спасибо за заказ!</h1>
        <p>Ваш заказ успешно оформлен и оплачен. Мы свяжемся с вами в ближайшее время для подтверждения деталей доставки.</p>
        
        <div class="order-info">
            <p><strong>Статус заказа:</strong> Оплачен</p>
            <p><strong>Способ оплаты:</strong> Банковская карта</p>
            <p><strong>Ожидайте звонка:</strong> В течение 15 минут</p>
        </div>
        
        <a href="index.html" class="btn">Вернуться на главную</a>
    </div>
</body>
</html>
