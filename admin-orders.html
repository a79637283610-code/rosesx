<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель заказов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            font-family: 'Georgia', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: var(--bg-secondary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            text-align: center;
        }

        .admin-container {
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            background: var(--bg-secondary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 30px;
        }

        .password-input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-primary);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .password-input:focus {
            border-color: var(--gold);
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            background: var(--gold);
            color: var(--bg-primary);
            font-family: 'Georgia', serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #e6c247;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .error {
            color: #ff4444;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: var(--bg-primary);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 25px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .order-date {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .order-type {
            background: rgba(212, 175, 55, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--gold);
        }

        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
        }

        .product-info {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-name {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .product-details {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .no-orders {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
        }

        .no-orders i {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--gold);
            color: var(--bg-primary);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .login-container,
            .admin-container {
                padding: 20px;
            }

            .order-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <h1>🔐 Вход в админ-панель</h1>
        <input type="password" class="password-input" id="passwordInput" placeholder="Введите пароль">
        <div class="error" id="error"></div>
        <button class="btn" onclick="login()">Войти</button>
    </div>

    <div class="admin-container" id="adminContainer" style="display: none;">
        <div class="header-actions">
            <h1>📋 Заказы</h1>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
        <div class="orders-list" id="ordersList">
            <div class="no-orders">
                <i class="fas fa-box-open"></i>
                <p>Заказов пока нет</p>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'Zender79';

        function login() {
            const password = document.getElementById('passwordInput').value;
            const error = document.getElementById('error');
            
            if (password === CORRECT_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadOrders();
                startAutoRefresh();
            } else {
                error.textContent = 'Неверный пароль';
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('error').textContent = '';
            stopAutoRefresh();
        }

        // Check for existing session on page load
        window.addEventListener('load', () => {
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadOrders();
                startAutoRefresh();
            }
        });

        let autoRefreshInterval;
        let lastOrderCount = 0;

        function startAutoRefresh() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const paidOrders = orders.filter(order => order.paymentStatus === 'paid');
            lastOrderCount = paidOrders.length;
            
            autoRefreshInterval = setInterval(() => {
                checkForNewOrders();
            }, 3000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        }

        function checkForNewOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const paidOrders = orders.filter(order => order.paymentStatus === 'paid');
            
            if (paidOrders.length > lastOrderCount) {
                playNotificationSound();
                loadOrders();
                lastOrderCount = paidOrders.length;
            }
        }

        function playNotificationSound() {
        function playNotificationSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ');
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
            audio.play();
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const ordersList = document.getElementById('ordersList');
            
            // Фильтруем только оплаченные заказы
            const paidOrders = orders.filter(order => order.paymentStatus === 'paid');
            
            if (paidOrders.length === 0) {
                ordersList.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-box-open"></i>
                        <p>Оплаченных заказов пока нет</p>
                    </div>
                `;
                return;
            }

            ordersList.innerHTML = paidOrders.map((order, index) => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-date">${order.date}</span>
                        <span class="order-type">${order.recipientType === 'myself' ? 'Для себя' : 'В подарок'}</span>
                    </div>
                    
                    <div class="product-info">
                        <div class="product-name">${order.productName}</div>
                        <div class="product-details">${order.quantity} роз • ${order.totalAmount}</div>
                        <div class="product-details">${order.roseLength} • ${order.roseVariety}</div>
                    </div>
                    
                    ${order.recipientType === 'myself' ? `
                        <div class="order-info">
                            <div class="info-item">
                                <span class="info-label">Имя</span>
                                <span class="info-value">${order.myselfName}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Телефон</span>
                                <span class="info-value">${order.myselfPhone}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Адрес</span>
                                <span class="info-value">${order.myselfAddress}</span>
                            </div>
                            ${order.socialNetwork ? `
                                <div class="info-item">
                                    <span class="info-label">Соцсеть</span>
                                    <span class="info-value">${order.socialNetwork}</span>
                                </div>
                            ` : ''}
                            ${order.myselfUsername && order.myselfUsername !== '@' ? `
                                <div class="info-item">
                                    <span class="info-label">Юзернейм</span>
                                    <span class="info-value">${order.myselfUsername}</span>
                                </div>
                            ` : ''}
                        </div>
                    ` : `
                        <div class="order-info">
                            <div class="info-item">
                                <span class="info-label">Имя заказчика</span>
                                <span class="info-value">${order.giftYourName}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Телефон заказчика</span>
                                <span class="info-value">${order.giftYourPhone}</span>
                            </div>
                            ${order.socialNetwork ? `
                                <div class="info-item">
                                    <span class="info-label">Соцсеть</span>
                                    <span class="info-value">${order.socialNetwork}</span>
                                </div>
                            ` : ''}
                            ${order.giftYourUsername && order.giftYourUsername !== '@' ? `
                                <div class="info-item">
                                    <span class="info-label">Юзернейм</span>
                                    <span class="info-value">${order.giftYourUsername}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="order-info" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
                            <div class="info-item">
                                <span class="info-label">Имя получателя</span>
                                <span class="info-value">${order.giftRecipientName}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Телефон получателя</span>
                                <span class="info-value">${order.giftRecipientPhone}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Адрес получателя</span>
                                <span class="info-value">${order.addressKnown === 'know' ? order.giftRecipientAddress : 'Неизвестно (уточним у получателя)'}</span>
                            </div>
                        </div>
                    `}
                </div>
            `).reverse().join('');
        }

        // Обработка нажатия Enter
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
